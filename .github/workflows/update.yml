name: STRATEGY — Daily Update

on:
  schedule:
    - cron: '0 22 * * 1-5'  # Ogni giorno feriale alle 22:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy yfinance

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Commit & push
        run: |
          git config user.name  "Strategy Bot"
          git config user.email "strategy-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update $(date -u +%Y-%m-%d)"
          git push
